name: release

# Republish the release on every release merge to main: one tar.gz + one zip source
# snapshot per revision, tagged v<version> from the plugin manifest
# (setup-plugin/.claude-plugin/plugin.json) - the marketplace serves that same manifest
# from main, so the marketplace, main, and the release always carry ONE version (the
# parity lint keeps marketplace.json equal). A RELEASE-SOURCE file inside each archive
# names the exact commit and version. The installers and the setup/update/configure
# plugin skills download releases/latest/download/... (always the newest release); a shallow
# clone of main is their fallback - which covers the brief delete/recreate window this
# job opens.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve the version (the plugin/marketplace version)
        id: ver
        run: echo "version=$(node -p "require('./setup-plugin/.claude-plugin/plugin.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build the source archives
        run: |
          printf 'sha: %s\nref: main\nversion: %s\nbuilt: %s\n' "$GITHUB_SHA" "${{ steps.ver.outputs.version }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > RELEASE-SOURCE
          git archive --format=tar.gz --add-file=RELEASE-SOURCE -o claude-stack.tar.gz HEAD
          git archive --format=zip    --add-file=RELEASE-SOURCE -o claude-stack.zip    HEAD

      - name: Recreate the release for this version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true      # the pre-versioning rolling release; no-op once gone
          gh release delete "v$VERSION" --yes --cleanup-tag 2>/dev/null || true # a same-version re-release refreshes the assets
          gh release create "v$VERSION" claude-stack.tar.gz claude-stack.zip \
            --latest --title "v$VERSION" \
            --notes "Source snapshot of main @ ${GITHUB_SHA} (plugin/marketplace version $VERSION) - consumed by the stack installers and the setup/update/configure plugin skills. RELEASE-SOURCE inside each archive names this commit; not meant for manual download."
